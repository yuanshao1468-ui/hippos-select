<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日系質感選物 | Hippo's Select</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏捲軸但保持可滑動 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { font-family: 'PingFang TC', 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f7f7f7; }
        .shopee-btn { background-color: #ee4d2d; }
        .shopee-btn:hover { background-color: #d73211; }
    </style>
</head>
<body class="text-gray-800 antialiased pb-10">

    <!-- 頂部導覽列 -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-gray-800">✨ Hippo's Select</h1>
            <span class="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">質感好物推薦</span>
        </div>
    </header>

    <!-- 主視覺 Banner -->
    <div class="max-w-4xl mx-auto px-4 mt-4">
        <div class="rounded-2xl bg-gradient-to-r from-gray-100 to-gray-200 p-6 flex flex-col justify-center items-start bg-cover bg-center" style="background-image: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.9)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');">
            <h2 class="text-2xl font-bold mb-1">今日限時破盤特賣</h2>
            <p class="text-sm text-gray-600 mb-4">嚴選全網最高 CP 值、破萬銷量大眾爆款</p>
        </div>
    </div>

    <!-- 分類標籤 (橫向滑動) -->
    <div class="max-w-4xl mx-auto px-4 mt-6">
        <div class="flex overflow-x-auto no-scrollbar space-x-3 pb-2" id="category-container">
            <!-- JS 自動生成分類 -->
        </div>
    </div>

    <!-- 商品列表 (瀑布流網格) -->
    <div class="max-w-4xl mx-auto px-4 mt-4">
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="product-container">
            <!-- JS 自動生成商品卡片 -->
        </div>
    </div>

    <script>
        let storeData = [];
        const categories = ["全部", "居家生活", "美妝保養", "3C配件", "美食零食", "母嬰用品"];
        let currentCategory = "全部";

        // 從 JSON 載入真實數據
        async function loadData() {
            try {
                const res = await fetch('./store_data.json');
                storeData = await res.json();
                renderCategories();
                renderProducts();
            } catch (err) {
                console.error('資料載入失敗，顯示預設畫面', err);
                document.getElementById('product-container').innerHTML = '<p class="col-span-2 text-center text-gray-500 py-10">商品資料更新中...</p>';
            }
        }

        function renderCategories() {
            const container = document.getElementById('category-container');
            container.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                const isActive = cat === currentCategory;
                btn.className = `px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors ${isActive ? 'bg-gray-800 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    currentCategory = cat;
                    renderCategories();
                    renderProducts();
                };
                container.appendChild(btn);
            });
        }

        function renderProducts() {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            
            const filteredData = currentCategory === "全部" 
                ? storeData 
                : storeData.filter(p => p.category === currentCategory);

            filteredData.forEach(p => {
                const originalPrice = p.originalPrice || Math.floor(p.price * 1.3);
                const discount = Math.round((1 - p.price / originalPrice) * 10);
                const card = document.createElement('a');
                card.href = p.link;
                card.target = "_blank";
                card.className = "bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow flex flex-col";
                
                card.innerHTML = `
                    <div class="relative w-full pt-[100%] bg-gray-100">
                        <img src="${p.image}" class="absolute top-0 left-0 w-full h-full object-cover" alt="商品圖片">
                        <div class="absolute top-2 left-2 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-sm">
                            ${discount}折
                        </div>
                    </div>
                    <div class="p-3 flex flex-col flex-grow">
                        <h3 class="text-sm text-gray-800 line-clamp-2 leading-snug mb-2">${p.name}</h3>
                        <div class="mt-auto">
                            <div class="flex items-center gap-1.5 mb-1">
                                <span class="text-xs text-gray-400 line-through">$${originalPrice}</span>
                                <span class="text-lg font-bold text-red-600">$${p.price}</span>
                            </div>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-xs text-gray-500">已售 ${p.sales}</span>
                                <button class="shopee-btn text-white text-xs font-medium px-3 py-1.5 rounded hover:opacity-90 transition-opacity">
                                    搶購
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 初始化
        loadData();
    </script>
</body>
</html>
